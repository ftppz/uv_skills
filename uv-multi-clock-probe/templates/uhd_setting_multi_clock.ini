# =============================================================================
# uhd_setting_multi_clock.ini template — MULTI CLOCK DOMAIN
# One [<group>] section per trigger_net group (each = one clock domain).
# Cross-domain convergence: UHD_FINAL_CONDITIONS_LOGIC with LOGIC=OR ONLY.
#   (Cross-domain AND is NOT supported; same-domain uses
#    UHD_CLK_SYNC_GROUP_CONDITIONS_LOGIC_<n> for AND/ORDER.)
# Group names must match probe.tcl's trigger_net -group exactly.
# =============================================================================

# ---- Domain 1 ----
[<group_1>]
LOGIC = OR
<top>.<domain_1_trigger_signal> = 1

# ---- Domain 2 ----
[<group_2>]
LOGIC = OR
<top>.<domain_2_trigger_signal> = 1

# ---- Cross-domain: OR ONLY (one UHD_FINAL_CONDITIONS_LOGIC per file) ----
[UHD_FINAL_CONDITIONS_LOGIC]
LOGIC = OR
<group_1>
<group_2>

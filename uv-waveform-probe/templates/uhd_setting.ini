# =============================================================================
# uhd_setting.ini 模板 - 改 <...> 部分即可
# 触发条件值: 信号变成这个值时触发抓波形
# [<触发组名>] 必须和 probe.tcl 里 trigger_net -group 一致
# =============================================================================

[<触发组名>]
LOGIC = OR
top.<触发信号> = 1

# 多个触发组的组合逻辑(只有一个组时 OR/AND 都行)
[UHD_FINAL_CONDITIONS_LOGIC]
LOGIC = OR
<触发组名>

[<trigger_group>]
LOGIC = OR
top.<trigger_signal> = 1

# Combinational logic across multiple groups (with only one group, OR/AND both work)
[UHD_FINAL_CONDITIONS_LOGIC]
LOGIC = OR
<trigger_group>
